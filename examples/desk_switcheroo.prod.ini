; Desk Switcheroo — Production Configuration
; Copy to desk_switcheroo.ini in the script directory to use.

[General]
start_with_windows=true
start_minimized=false
wrap_navigation=true
auto_create_desktop=false
number_padding=2
widget_position=bottom-left
widget_offset_x=0
widget_offset_y=0
widget_width=0
widget_height=0
widget_drag_enabled=false
widget_color_bar=false
widget_color_bar_height=2
tray_icon_mode=false
quick_access_enabled=false
list_keyboard_nav=false
auto_update_enabled=false
auto_update_interval=168

[Updates]
update_check_on_startup=false
update_check_days=7

[Display]
show_count=false
count_font_size=7
theme_alpha_main=235
theme=dark
thumbnails_enabled=false
thumbnail_width=160
thumbnail_height=90
thumbnail_use_screenshot=false
thumbnail_cache_ttl=30
list_font_name=
list_font_size=8
list_scrollable=false
list_max_visible=10
list_scroll_speed=1
tooltip_font_size=8

[Scroll]
scroll_enabled=false
scroll_direction=normal
scroll_wrap=true
list_scroll_enabled=false
list_scroll_action=switch

[Hotkeys]
hotkey_desktop_count=9
hotkey_next=
hotkey_prev=
hotkey_desktop_1=
hotkey_desktop_2=
hotkey_desktop_3=
hotkey_desktop_4=
hotkey_desktop_5=
hotkey_desktop_6=
hotkey_desktop_7=
hotkey_desktop_8=
hotkey_desktop_9=
hotkey_toggle_list=

[Behavior]
confirm_delete=true
middle_click_delete=false
move_window_enabled=true
peek_bounce_delay=500
auto_hide_timeout=3000
topmost_interval=300
cm_auto_hide_delay=500
config_watcher_enabled=false
config_watcher_interval=60000
count_cache_ttl=1000
confirm_quit=false
debug_mode=false

[DesktopColors]
desktop_colors_enabled=false
desktop_1_color=0x000000
desktop_2_color=0x000000
desktop_3_color=0x000000
desktop_4_color=0x000000
desktop_5_color=0x000000
desktop_6_color=0x000000
desktop_7_color=0x000000
desktop_8_color=0x000000
desktop_9_color=0x000000

[Logging]
logging_enabled=false
log_folder=
log_level=error
log_max_size_mb=5
log_rotate_count=3
log_compress_old=false
log_include_pid=false
log_include_func=false
log_date_format=iso
log_flush_immediate=true
