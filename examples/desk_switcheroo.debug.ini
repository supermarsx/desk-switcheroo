; Desk Switcheroo — Debug Configuration Example
; Copy this file to desk_switcheroo.ini in the script directory to use.
; Enables all features for testing and development.

[General]
start_with_windows=false
start_minimized=false
wrap_navigation=true
auto_create_desktop=true
number_padding=2
widget_position=left
widget_offset_x=0
widget_drag_enabled=true
tray_icon_mode=false
quick_access_enabled=true
list_keyboard_nav=true

[Display]
show_count=true
count_font_size=7
theme_alpha_main=245
theme=dark

[Scroll]
scroll_enabled=true
scroll_direction=normal
scroll_wrap=true
list_scroll_enabled=true
list_scroll_action=switch

[Hotkeys]
hotkey_next=^!{RIGHT}
hotkey_prev=^!{LEFT}
hotkey_desktop_1=^!1
hotkey_desktop_2=^!2
hotkey_desktop_3=^!3
hotkey_desktop_4=^!4
hotkey_desktop_5=^!5
hotkey_desktop_6=^!6
hotkey_desktop_7=^!7
hotkey_desktop_8=^!8
hotkey_desktop_9=^!9
hotkey_toggle_list=^!l

[Behavior]
confirm_delete=true
middle_click_delete=true
move_window_enabled=true
peek_bounce_delay=500
auto_hide_timeout=5000
topmost_interval=300
cm_auto_hide_delay=1000
config_watcher_enabled=true
config_watcher_interval=10000

[DesktopColors]
desktop_colors_enabled=true
desktop_1_color=0x4A9EFF
desktop_2_color=0x4AFF7E
desktop_3_color=0xFF7E4A
desktop_4_color=0xFFD54A
desktop_5_color=0xB44AFF
desktop_6_color=0xFF4A9E
desktop_7_color=0x4AFFCF
desktop_8_color=0x9EFF4A
desktop_9_color=0xFF4A4A

[Logging]
logging_enabled=true
log_file_path=
log_level=debug
