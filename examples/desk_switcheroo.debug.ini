; Desk Switcheroo — Debug Configuration
; Copy to desk_switcheroo.ini in the script directory to use.
; All features enabled for testing and development.

[General]
language=en-US
start_with_windows=false
start_minimized=false
wrap_navigation=true
auto_create_desktop=true
number_padding=2
widget_position=bottom-left
widget_offset_x=0
widget_offset_y=0
widget_width=0
widget_height=0
widget_drag_enabled=true
widget_color_bar=true
widget_color_bar_height=2
widget_color_bar_anim=grow
widget_color_bar_anim_duration=300
tray_icon_mode=false
quick_access_enabled=true
list_keyboard_nav=true
auto_update_enabled=true
auto_update_interval=1

[Updates]
update_check_on_startup=true
update_check_days=1

[Display]
show_count=true
count_font_size=7
theme_alpha_main=245
theme=dark
thumbnails_enabled=true
thumbnail_width=200
thumbnail_height=120
thumbnail_use_screenshot=false
thumbnail_cache_ttl=10
list_font_name=
list_font_size=8
list_scrollable=true
list_max_visible=8
list_scroll_speed=2
tooltip_font_size=9

[Scroll]
scroll_enabled=true
scroll_direction=normal
scroll_wrap=true
list_scroll_enabled=true
list_scroll_action=switch

[Hotkeys]
hotkey_next=^!{RIGHT}
hotkey_prev=^!{LEFT}
hotkey_desktop_1=^!1
hotkey_desktop_2=^!2
hotkey_desktop_3=^!3
hotkey_desktop_4=^!4
hotkey_desktop_5=^!5
hotkey_desktop_6=^!6
hotkey_desktop_7=^!7
hotkey_desktop_8=^!8
hotkey_desktop_9=^!9
hotkey_toggle_list=^!l
hotkey_toggle_slideshow=
hotkey_move_desktop_next=
hotkey_move_desktop_prev=

[Behavior]
confirm_delete=true
middle_click_delete=true
move_window_enabled=true
move_here_click_enabled=false
peek_bounce_delay=500
auto_hide_timeout=5000
topmost_interval=300
cm_auto_hide_delay=1000
config_watcher_enabled=true
config_watcher_interval=10000
name_sync_interval=2000
dll_check_interval=30000
disable_native_osd=false

[Slideshow]
slideshow_enabled=true
slideshow_interval=20000
slideshow_show_in_menu=true
notify_slideshow_toggle=true
slideshow_selection_mode=all
slideshow_direction=forward
slideshow_name_filter=
slideshow_sequence=
slideshow_desktop_intervals=
slideshow_loop_mode=infinite
slideshow_loop_count=3
slideshow_loop_duration=300
slideshow_autostart=false
slideshow_autostart_delay=5000
slideshow_break_on_manual_switch=true
slideshow_break_on_widget_click=true
slideshow_break_on_hotkey=true
slideshow_break_on_any_input=false

[WindowList]
window_list_draggable=true
window_list_custom_x=-1
window_list_custom_y=-1
window_list_pinned=false

[Animations]
animations_enabled=true
fade_in_duration=80
fade_out_duration=80
fade_step=30
toast_fade_out_duration=300
fade_sleep_ms=8
confirm_quit=false
debug_mode=true

[DesktopColors]
desktop_colors_enabled=true
desktop_1_color=0x4A9EFF
desktop_2_color=0x4AFF7E
desktop_3_color=0xFF7E4A
desktop_4_color=0xFFD54A
desktop_5_color=0xB44AFF
desktop_6_color=0xFF4A9E
desktop_7_color=0x4AFFCF
desktop_8_color=0x9EFF4A
desktop_9_color=0xFF4A4A

[TaskbarAutoHide]
autohide_sync_enabled=false
autohide_poll_interval=150
autohide_hide_delay=200
autohide_show_delay=0
autohide_use_fade=true
autohide_fade_duration=80
autohide_sync_desktop_list=true
autohide_sync_window_list=false
autohide_hidden_threshold=4
autohide_recheck_count=10
autohide_skip_if_dialog=true

[Logging]
logging_enabled=true
log_folder=
log_level=debug
log_max_size_mb=10
log_rotate_count=5
log_compress_old=false
log_include_pid=true
log_date_format=iso
log_flush_immediate=true
