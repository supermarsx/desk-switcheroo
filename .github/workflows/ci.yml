name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install AutoIt
        run: pwsh scripts/install-autoit.ps1
      - name: Lint
        run: |
          $errors = 0
          & "$env:AUTOIT_PATH\Au3Check.exe" desktop_switcher.au3
          if ($LASTEXITCODE -ne 0) { $errors++ }
          Push-Location tests
          & "$env:AUTOIT_PATH\Au3Check.exe" TestRunner.au3
          if ($LASTEXITCODE -ne 0) { $errors++ }
          Pop-Location
          if ($errors -gt 0) { exit 1 }
        shell: pwsh

  format:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check formatting
        run: |
          $files = Get-ChildItem -Path . -Filter "*.au3" -Recurse | Where-Object { $_.FullName -notmatch "\\build\\" }
          $bad = 0
          foreach ($f in $files) {
            $content = [System.IO.File]::ReadAllText($f.FullName)
            $normalized = $content -replace "`r?`n", "`r`n"
            $normalized = ($normalized -split "`r`n" | ForEach-Object { $_.TrimEnd() }) -join "`r`n"
            if (-not $normalized.EndsWith("`r`n")) { $normalized += "`r`n" }
            if ($content -ne $normalized) {
              Write-Host "FAIL: $($f.Name) has formatting issues" -ForegroundColor Red
              $bad++
            }
          }
          if ($bad -gt 0) { Write-Error "$bad file(s) need formatting (run scripts/format.ps1)"; exit 1 }
          Write-Host "All files formatted correctly." -ForegroundColor Green
        shell: pwsh

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install AutoIt
        run: pwsh scripts/install-autoit.ps1
      - name: Run tests (x64 for DLL compatibility)
        run: |
          $au3 = "$env:AUTOIT_PATH\AutoIt3_x64.exe"
          if (-not (Test-Path $au3)) { $au3 = "$env:AUTOIT_PATH\AutoIt3.exe" }
          Write-Host "Using: $au3"
          & $au3 /ErrorStdOut tests\TestRunner.au3 2>&1 | Tee-Object -FilePath test_output.txt
          $code = $LASTEXITCODE
          Get-Content test_output.txt
          exit $code
        shell: pwsh
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output
          path: test_output.txt

  build:
    runs-on: windows-latest
    needs: [lint, format, test]
    steps:
      - uses: actions/checkout@v6
      - name: Install AutoIt
        run: pwsh scripts/install-autoit.ps1
      - name: Generate icon
        run: |
          $au3 = "$env:AUTOIT_PATH\AutoIt3_x64.exe"
          if (-not (Test-Path $au3)) { $au3 = "$env:AUTOIT_PATH\AutoIt3.exe" }
          & $au3 tools\generate_icon.au3
        shell: pwsh
      - name: Build
        run: pwsh scripts/build.ps1
      - name: Install NSIS
        run: choco install nsis -y --no-progress
      - name: Package (installer + portable zip)
        run: pwsh scripts/package.ps1
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: desk-switcheroo-build
          path: build/

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: windows-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute next version (YY.N) and update VERSION file
        id: version
        run: |
          $year = (Get-Date).ToString("yy")
          $tags = git tag -l "v${year}.*" --sort=-v:refname 2>$null
          if ($tags) {
            $latest = ($tags | Select-Object -First 1) -replace "^v", ""
            $parts = $latest -split "\."
            $next = [int]$parts[1] + 1
          } else {
            $next = 1
          }
          $version = "${year}.${next}"
          Write-Host "Next version: v${version}"
          echo "tag=v${version}" >> $env:GITHUB_OUTPUT
          echo "version=${version}" >> $env:GITHUB_OUTPUT
        shell: pwsh
      - name: Update VERSION file and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Update VERSION file so the app knows its version
          Set-Content -Path VERSION -Value "${{ steps.version.outputs.version }}" -NoNewline
          git add VERSION
          git commit -m "Bump version to ${{ steps.version.outputs.version }}" --allow-empty
          git tag -a ${{ steps.version.outputs.tag }} -m "Release ${{ steps.version.outputs.version }}"
          git push origin HEAD:main ${{ steps.version.outputs.tag }}
        shell: pwsh
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: desk-switcheroo-build
          path: build/
      - name: Create source zip (au3 scripts + DLL + fonts)
        run: |
          $sourceDir = "build\_source"
          New-Item $sourceDir -ItemType Directory -Force | Out-Null
          Copy-Item desktop_switcher.au3 $sourceDir\
          Copy-Item -Path includes -Destination $sourceDir\includes -Recurse
          Copy-Item VirtualDesktopAccessor.dll $sourceDir\
          if (Test-Path fonts) { Copy-Item -Path fonts -Destination $sourceDir\fonts -Recurse }
          if (Test-Path assets) { Copy-Item -Path assets -Destination $sourceDir\assets -Recurse }
          if (Test-Path license.md) { Copy-Item license.md $sourceDir\ }
          if (Test-Path README.md) { Copy-Item README.md $sourceDir\ }
          Compress-Archive -Path "$sourceDir\*" -DestinationPath build\DeskSwitcheroo_Source.zip -Force
          Remove-Item $sourceDir -Recurse -Force
          Write-Host "Source zip created" -ForegroundColor Green
        shell: pwsh
      - name: Create Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Desk Switcheroo ${{ steps.version.outputs.version }}
          files: |
            build/DeskSwitcheroo_Setup.exe
            build/DeskSwitcheroo_Portable.zip
            build/DeskSwitcheroo_Source.zip
          generate_release_notes: true
