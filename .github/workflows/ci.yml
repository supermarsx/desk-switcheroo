name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install AutoIt
        run: choco install autoit -y --no-progress
      - name: Lint
        run: |
          $env:Path += ";C:\Program Files (x86)\AutoIt3"
          & Au3Check.exe desktop_switcher.au3
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

  format:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          $files = Get-ChildItem -Path . -Filter "*.au3" -Recurse | Where-Object { $_.FullName -notmatch "\\build\\" }
          $bad = 0
          foreach ($f in $files) {
            $content = [System.IO.File]::ReadAllText($f.FullName)
            $normalized = $content -replace "`r?`n", "`r`n"
            $normalized = ($normalized -split "`r`n" | ForEach-Object { $_.TrimEnd() }) -join "`r`n"
            if (-not $normalized.EndsWith("`r`n")) { $normalized += "`r`n" }
            if ($content -ne $normalized) {
              Write-Host "FAIL: $($f.Name) has formatting issues" -ForegroundColor Red
              $bad++
            }
          }
          if ($bad -gt 0) { Write-Error "$bad file(s) need formatting (run scripts/format.ps1)"; exit 1 }
          Write-Host "All files formatted correctly." -ForegroundColor Green
        shell: pwsh

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install AutoIt
        run: choco install autoit -y --no-progress
      - name: Run tests (x64 for DLL compatibility)
        run: |
          $au3 = "C:\Program Files (x86)\AutoIt3\AutoIt3_x64.exe"
          if (-not (Test-Path $au3)) { $au3 = "C:\Program Files (x86)\AutoIt3\AutoIt3.exe" }
          Write-Host "Using: $au3"
          & $au3 /ErrorStdOut tests\TestRunner.au3 2>&1 | Tee-Object -FilePath test_output.txt
          $code = $LASTEXITCODE
          Get-Content test_output.txt
          exit $code
        shell: pwsh
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test_output.txt

  build:
    runs-on: windows-latest
    needs: [lint, format, test]
    steps:
      - uses: actions/checkout@v4
      - name: Install AutoIt
        run: choco install autoit -y --no-progress
      - name: Generate icon
        run: |
          $au3 = "C:\Program Files (x86)\AutoIt3\AutoIt3_x64.exe"
          if (-not (Test-Path $au3)) { $au3 = "C:\Program Files (x86)\AutoIt3\AutoIt3.exe" }
          & $au3 tools\generate_icon.au3
        shell: pwsh
      - name: Build
        run: pwsh scripts/build.ps1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desk-switcheroo-build
          path: build/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          choco install autoit nsis -y --no-progress
      - name: Package
        run: pwsh scripts/package.ps1
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/DeskSwitcheroo_Setup.exe
            build/DeskSwitcheroo_Portable.zip
          generate_release_notes: true
