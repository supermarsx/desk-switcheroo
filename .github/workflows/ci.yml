name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install AutoIt
        run: choco install autoit -y --no-progress
      - name: Lint
        run: |
          $env:Path += ";C:\Program Files (x86)\AutoIt3"
          & Au3Check.exe desktop_switcher.au3
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

  test:
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install AutoIt
        run: choco install autoit -y --no-progress
      - name: Run tests
        run: |
          $env:Path += ";C:\Program Files (x86)\AutoIt3"
          & AutoIt3.exe /ErrorStdOut tests\TestRunner.au3 2>&1 | Tee-Object -FilePath test_output.txt
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

  build:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install AutoIt
        run: choco install autoit -y --no-progress
      - name: Build
        run: pwsh scripts/build.ps1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desk-switcheroo-build
          path: build/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          choco install autoit nsis -y --no-progress
      - name: Package
        run: pwsh scripts/package.ps1
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/DeskSwitcheroo_Setup.exe
            build/DeskSwitcheroo_Portable.zip
          generate_release_notes: true
