tip_rules_help=As regras movem automaticamente novas janelas para uma área de trabalho específica.\n\nTipo: Clique para alternar entre Process e Class.\n  Process — correspondência pelo nome do executável (ex: chrome.exe)\n  Class — correspondência pela classe da janela (ex: CabinetWClass)\n\nPadrão: O texto a ser correspondido. Curingas * e ? são suportados.\n  ex: discord* corresponde a discord.exe e discordptb.exe\n\nDesk: O número da área de trabalho para onde enviar as janelas correspondentes.\nDeixe uma linha vazia para ignorá-la.
