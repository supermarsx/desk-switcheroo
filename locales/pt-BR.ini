[CLI]
help_text=Desk Switcheroo — Interface de linha de comando\n\nUso: desk_switcheroo [opções]\n\nNavegação:\n  --goto N              Ir para a Área de Trabalho N (base 1)\n  --next                Ir para a próxima Área de Trabalho\n  --prev                Ir para a Área de Trabalho anterior\n\nGerenciamento de Áreas de Trabalho:\n  --add-desktop         Criar uma nova Área de Trabalho virtual\n  --remove-desktop N    Remover a Área de Trabalho N\n  --rename N "label"    Renomear a Área de Trabalho N\n  --move-window N       Mover a janela ativa para a Área de Trabalho N\n\nConsulta:\n  --list-desktops       Listar todas as Áreas de Trabalho (número e nome)\n  --get-current         Mostrar o número da Área de Trabalho atual\n  --status              Mostrar o status em JSON\n\nControle da interface:\n  --toggle-list         Alternar o painel da lista de Áreas de Trabalho\n  --toggle-carousel     Alternar o modo carrossel\n  --load-profile "name" Carregar um perfil com nome\n  --save-profile "name" Salvar o estado atual como um perfil com nome\n\nInformações:\n  --help                Mostrar esta ajuda\n  --version             Mostrar o número da versão\n\nPrefixos aceitos: --command, -command e /command.\nSe já existir uma instância em execução, os comandos serão enviados via IPC.
err_goto_requires_number=Erro: --goto requer um número de Área de Trabalho
