tip_rules_help=Las reglas mueven automáticamente ventanas nuevas a un escritorio específico.\n\nTipo: Haz clic para alternar entre Process y Class.\n  Process — coincidencia por nombre de ejecutable (ej. chrome.exe)\n  Class — coincidencia por clase de ventana (ej. CabinetWClass)\n\nPatrón: El texto con el que se compara. Se admiten comodines * y ?.\n  ej. discord* coincide con discord.exe y discordptb.exe\n\nEscritorio: El número de escritorio al que enviar las ventanas coincidentes.\nDeja una fila vacía para omitirla.
