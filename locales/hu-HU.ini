[CLI]
help_text=Desk Switcheroo — Parancssori felület\n\nHasználat: desk_switcheroo [opciók]\n\nNavigáció:\n  --goto N              Ugrás a(z) N. asztalra (1-alapú)\n  --next                Ugrás a következő asztalra\n  --prev                Ugrás az előző asztalra\n\nAsztalkezelés:\n  --add-desktop         Új virtuális asztal létrehozása\n  --remove-desktop N    Az N. asztal eltávolítása\n  --rename N "label"    Az N. asztal átnevezése\n  --move-window N       Az aktív ablak áthelyezése az N. asztalra\n\nLekérdezés:\n  --list-desktops       Az összes asztal listázása (szám és név)\n  --get-current         Az aktuális asztal számának kiírása\n  --status              JSON állapot kiírása\n\nFelületvezérlés:\n  --toggle-list         Az asztallista panel váltása\n  --toggle-carousel     A körhinta mód váltása\n  --load-profile "name" Egy megnevezett profil betöltése\n  --save-profile "name" Az aktuális állapot mentése megnevezett profilként\n\nInformáció:\n  --help                E súgó megjelenítése\n  --version             A verziószám megjelenítése\n\nA --command, -command és /command előtagok mind elfogadottak.\nHa már fut egy példány, a parancsok IPC-n keresztül kerülnek elküldésre.
