[CLI]
help_text=Desk Switcheroo — Interfaz de línea de comandos\n\nUso: desk_switcheroo [opciones]\n\nNavegación:\n  --goto N              Cambiar al escritorio N (basado en 1)\n  --next                Cambiar al siguiente escritorio\n  --prev                Cambiar al escritorio anterior\n\nGestión de escritorios:\n  --add-desktop         Crear un nuevo escritorio virtual\n  --remove-desktop N    Eliminar el escritorio N\n  --rename N "label"    Renombrar el escritorio N\n  --move-window N       Mover la ventana activa al escritorio N\n\nConsulta:\n  --list-desktops       Listar todos los escritorios (número y nombre)\n  --get-current         Mostrar el número del escritorio actual\n  --status              Mostrar el estado en JSON\n\nControl de la interfaz:\n  --toggle-list         Alternar el panel de lista de escritorios\n  --toggle-slideshow    Alternar el pase de diapositivas de escritorios (alias: --toggle-carousel)\n  --load-profile "name" Cargar un perfil con nombre\n  --save-profile "name" Guardar el estado actual como un perfil con nombre\n\nInformación:\n  --help                Mostrar esta ayuda\n  --version             Mostrar el número de versión\n\nPrefijos admitidos: --command, -command y /command.\nSi ya existe una instancia en ejecución, los comandos se envían por IPC.
