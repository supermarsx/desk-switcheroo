[CLI]
help_text=Desk Switcheroo — Command-line interface\n\nUsage: desk_switcheroo [options]\n\nNavigation:\n  --goto N              Switch to desktop N (1-based)\n  --next                Switch to next desktop\n  --prev                Switch to previous desktop\n\nDesktop management:\n  --add-desktop         Create a new virtual desktop\n  --remove-desktop N    Remove desktop N\n  --rename N "label"    Rename desktop N\n  --move-window N       Move active window to desktop N\n\nQuery:\n  --list-desktops       List all desktops (number and name)\n  --get-current         Print current desktop number\n  --status              Print JSON status\n\nGUI control:\n  --toggle-list         Toggle the desktop list panel\n  --toggle-carousel     Toggle carousel mode\n  --load-profile "name" Load a named profile\n  --save-profile "name" Save current state as named profile\n\nInformation:\n  --help                Print this usage information\n  --version             Print version number\n\nPrefix styles: --command, -command, /command are all accepted.\nIf a running instance exists, commands are sent via IPC.
err_goto_requires_number=Error: --goto requires a desktop number
err_desktop_out_of_range=Error: desktop number out of range (1-{1})
err_remove_requires_number=Error: --remove-desktop requires a desktop number
err_rename_requires_number_label=Error: --rename requires a desktop number and label
err_rename_requires_label=Error: --rename requires a label as second argument
err_move_requires_number=Error: --move-window requires a desktop number
err_no_active_window=Error: no active window found
err_requires_running_instance=Error: --{1} requires a running instance
err_unknown_command=Error: unknown command '--{1}'
