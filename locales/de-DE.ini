[CLI]
help_text=Desk Switcheroo — Befehlszeilenschnittstelle\n\nVerwendung: desk_switcheroo [optionen]\n\nNavigation:\n  --goto N              Zu Desktop N wechseln (1-basiert)\n  --next                Zum nächsten Desktop wechseln\n  --prev                Zum vorherigen Desktop wechseln\n\nDesktop-Verwaltung:\n  --add-desktop         Einen neuen virtuellen Desktop erstellen\n  --remove-desktop N    Desktop N entfernen\n  --rename N "label"    Desktop N umbenennen\n  --move-window N       Aktives Fenster zu Desktop N verschieben\n\nAbfrage:\n  --list-desktops       Alle Desktops auflisten (Nummer und Name)\n  --get-current         Aktuelle Desktop-Nummer ausgeben\n  --status              JSON-Status ausgeben\n\nGUI-Steuerung:\n  --toggle-list         Desktoplisten-Panel umschalten\n  --toggle-slideshow    Die Desktop-Diashow umschalten (Alias: --toggle-carousel)\n  --load-profile "name" Ein benanntes Profil laden\n  --save-profile "name" Aktuellen Zustand als benanntes Profil speichern\n\nInformationen:\n  --help                Diese Hilfe ausgeben\n  --version             Versionsnummer ausgeben\n\nPräfixe: --command, -command und /command werden akzeptiert.\nWenn bereits eine Instanz läuft, werden Befehle per IPC gesendet.
