[CLI]
help_text=Desk Switcheroo — Kommandoradsgränssnitt\n\nAnvändning: desk_switcheroo [alternativ]\n\nNavigering:\n  --goto N              Gå till skrivbord N (1-baserat)\n  --next                Gå till nästa skrivbord\n  --prev                Gå till föregående skrivbord\n\nSkrivbordshantering:\n  --add-desktop         Skapa ett nytt virtuellt skrivbord\n  --remove-desktop N    Ta bort skrivbord N\n  --rename N "label"    Byt namn på skrivbord N\n  --move-window N       Flytta det aktiva fönstret till skrivbord N\n\nFråga:\n  --list-desktops       Visa alla skrivbord (nummer och namn)\n  --get-current         Visa numret på aktuellt skrivbord\n  --status              Visa JSON-status\n\nGränssnittsstyrning:\n  --toggle-list         Växla panelen för skrivbordslistan\n  --toggle-carousel     Växla karuselläge\n  --load-profile "name" Läs in en namngiven profil\n  --save-profile "name" Spara aktuellt läge som en namngiven profil\n\nInformation:\n  --help                Visa denna hjälp\n  --version             Visa versionsnumret\n\nPrefixen --command, -command och /command accepteras alla.\nOm en instans redan körs skickas kommandon via IPC.
