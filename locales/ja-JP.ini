[CLI]
help_text=Desk Switcheroo — コマンドラインインターフェイス\n\n使用法: desk_switcheroo [オプション]\n\nナビゲーション:\n  --goto N              デスクトップ N に切り替え（1 始まり）\n  --next                次のデスクトップに切り替え\n  --prev                前のデスクトップに切り替え\n\nデスクトップ管理:\n  --add-desktop         新しい仮想デスクトップを作成\n  --remove-desktop N    デスクトップ N を削除\n  --rename N "label"    デスクトップ N の名前を変更\n  --move-window N       アクティブウィンドウをデスクトップ N に移動\n\nクエリ:\n  --list-desktops       すべてのデスクトップを一覧表示（番号と名前）\n  --get-current         現在のデスクトップ番号を表示\n  --status              JSON ステータスを表示\n\nGUI 制御:\n  --toggle-list         デスクトップリストパネルを切り替え\n  --toggle-carousel     カルーセルモードを切り替え\n  --load-profile "name" 名前付きプロファイルを読み込む\n  --save-profile "name" 現在の状態を名前付きプロファイルとして保存\n\n情報:\n  --help                この使用方法を表示\n  --version             バージョン番号を表示\n\nプレフィックス形式: --command、-command、/command のいずれも使用できます。\n実行中のインスタンスがある場合、コマンドは IPC 経由で送信されます。
err_goto_requires_number=エラー: --goto にはデスクトップ番号が必要です
err_desktop_out_of_range=エラー: デスクトップ番号が範囲外です (1-{1})
err_remove_requires_number=エラー: --remove-desktop にはデスクトップ番号が必要です
err_rename_requires_number_label=エラー: --rename にはデスクトップ番号とラベルが必要です
err_rename_requires_label=エラー: --rename には 2 番目の引数としてラベルが必要です
err_move_requires_number=エラー: --move-window にはデスクトップ番号が必要です
err_no_active_window=エラー: アクティブウィンドウが見つかりません
err_requires_running_instance=エラー: --{1} には実行中のインスタンスが必要です
err_unknown_command=エラー: 不明なコマンド '--{1}'
