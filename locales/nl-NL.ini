[CLI]
help_text=Desk Switcheroo — Opdrachtregelinterface\n\nGebruik: desk_switcheroo [opties]\n\nNavigatie:\n  --goto N              Ga naar bureaublad N (1-gebaseerd)\n  --next                Ga naar het volgende bureaublad\n  --prev                Ga naar het vorige bureaublad\n\nBureaubladbeheer:\n  --add-desktop         Maak een nieuw virtueel bureaublad\n  --remove-desktop N    Verwijder bureaublad N\n  --rename N "label"    Hernoem bureaublad N\n  --move-window N       Verplaats het actieve venster naar bureaublad N\n\nOpvraag:\n  --list-desktops       Toon alle bureaubladen (nummer en naam)\n  --get-current         Toon het nummer van het huidige bureaublad\n  --status              Toon de JSON-status\n\nInterfacebediening:\n  --toggle-list         Schakel het bureaubladlijstpaneel\n  --toggle-carousel     Schakel de carrouselmodus\n  --load-profile "name" Laad een profiel met naam\n  --save-profile "name" Sla de huidige status op als profiel met naam\n\nInformatie:\n  --help                Toon deze hulp\n  --version             Toon het versienummer\n\nDe voorvoegsels --command, -command en /command worden allemaal geaccepteerd.\nAls er al een draaiende instantie is, worden opdrachten via IPC verzonden.
err_goto_requires_number=Fout: --goto vereist een bureaubladnummer
