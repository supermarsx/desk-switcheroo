[CLI]
help_text=Desk Switcheroo — 命令列介面\n\n用法: desk_switcheroo [選項]\n\n導覽:\n  --goto N              切換到桌面 N（從 1 開始）\n  --next                切換到下一個桌面\n  --prev                切換到上一個桌面\n\n桌面管理:\n  --add-desktop         建立新的虛擬桌面\n  --remove-desktop N    刪除桌面 N\n  --rename N "label"    重新命名桌面 N\n  --move-window N       將使用中的視窗移到桌面 N\n\n查詢:\n  --list-desktops       列出所有桌面（編號與名稱）\n  --get-current         顯示目前桌面編號\n  --status              顯示 JSON 狀態\n\n介面控制:\n  --toggle-list         切換桌面清單面板\n  --toggle-carousel     切換輪播模式\n  --load-profile "name" 載入命名設定檔\n  --save-profile "name" 將目前狀態儲存為命名設定檔\n\n資訊:\n  --help                顯示此說明\n  --version             顯示版本號\n\n支援 --command、-command 與 /command 前綴。\n如果已有執行中的實例，命令會透過 IPC 傳送。
