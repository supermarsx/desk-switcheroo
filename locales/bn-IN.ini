about_description=Windows-এর জন্য হালকা ভার্চুয়াল ডেস্কটপ সুইচার।\nএকটি কমপ্যাক্ট টাস্কবার উইজেট থেকে\nডেস্কটপ নেভিগেট, নাম পরিবর্তন, উঁকি দিন এবং পরিচালনা করুন।\nsupermarsx দ্বারা তৈরি। AutoIt দিয়ে নির্মিত।
