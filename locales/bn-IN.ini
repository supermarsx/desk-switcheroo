; Desk Switcheroo - বাংলা, ভারত (bn-IN)
; বাংলা স্থানীয়করণ ফাইল।
; লাইন ব্রেকের জন্য \n ব্যবহার করুন। গতিশীল মানের জন্য {1}, {2}, {3} ব্যবহার করুন।
; ইউনিকোড প্রতীক এই ফাইলে নেই -- সেগুলো কোডে থাকে।

