[CLI]
help_text=Desk Switcheroo — Giao diện dòng lệnh\n\nCách dùng: desk_switcheroo [tùy chọn]\n\nĐiều hướng:\n  --goto N              Chuyển tới màn hình nền N (đánh số từ 1)\n  --next                Chuyển tới màn hình nền tiếp theo\n  --prev                Chuyển tới màn hình nền trước đó\n\nQuản lý màn hình nền:\n  --add-desktop         Tạo màn hình nền ảo mới\n  --remove-desktop N    Xóa màn hình nền N\n  --rename N "label"    Đổi tên màn hình nền N\n  --move-window N       Di chuyển cửa sổ đang hoạt động tới màn hình nền N\n\nTruy vấn:\n  --list-desktops       Liệt kê tất cả màn hình nền (số và tên)\n  --get-current         Hiển thị số màn hình nền hiện tại\n  --status              Hiển thị trạng thái JSON\n\nĐiều khiển giao diện:\n  --toggle-list         Bật/tắt bảng danh sách màn hình nền\n  --toggle-carousel     Bật/tắt chế độ vòng quay\n  --load-profile "name" Tải hồ sơ có tên\n  --save-profile "name" Lưu trạng thái hiện tại thành hồ sơ có tên\n\nThông tin:\n  --help                Hiển thị trợ giúp này\n  --version             Hiển thị số phiên bản\n\nCác tiền tố --command, -command và /command đều được chấp nhận.\nNếu đã có một phiên bản đang chạy, lệnh sẽ được gửi qua IPC.
err_goto_requires_number=Lỗi: --goto yêu cầu một số màn hình nền
